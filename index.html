<!DOCTYPE html>  
<html>  
<head>  
<meta charset="utf-8">  
<title>Ubicación del usuario en tiempo real</title>  
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">  
<link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">  
<script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>  
<style>  
body { margin: 0; padding: 0; font-family: Arial, sans-serif; }  
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
.info-panel {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 10px;
  border-radius: 4px;
  z-index: 1;
  max-width: 300px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  transition: transform 0.3s ease-in-out;
}
.info-panel.hidden {
  transform: translateX(-110%);
}
.toggle-button {
  position: absolute;
  top: 10px;
  left: 10px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 4px;
  padding: 10px;
  cursor: pointer;
  z-index: 2;
}
.toggle-button:hover {
  background: #2874a6;
}
.mapboxgl-ctrl-geolocate {
  background-color: #3498db;
  color: white;
}
.welcome-message {
  background: #f1f1f1;
  padding: 10px;
  border-radius: 4px;
  margin-bottom: 10px;
  font-size: 14px;
  color: #333;
  text-align: center;
}
.auth-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}
.auth-card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 350px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
}
.auth-tabs {
  display: flex;
  margin-bottom: 20px;
  border-bottom: 2px solid #eee;
}
.auth-tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
}
.auth-tab.active {
  color: #3498db;
  border-bottom: 2px solid #3498db;
}
.auth-form {
  margin-top: 20px;
}
.form-group {
  margin-bottom: 15px;
}
.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}
.form-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  box-sizing: border-box;
}
.auth-button {
  width: 100%;
  padding: 12px;
  background-color: #3498db;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
}
.auth-button:hover {
  background-color: #2874a6;
}
.error-message {
  color: #e74c3c;
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
}
.profile-section {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}
.profile-info {
  flex: 1;
}
.logout-button {
  background: #e74c3c;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
.logout-button:hover {
  background: #c0392b;
}
</style>  
</head>  
<body>  
<div id="map"></div>
<button class="toggle-button" onclick="toggleInfoPanel()">☰</button>

<!-- Panel de información principal -->
<div id="info-panel" class="info-panel">
  <div id="profile-section" class="profile-section">
    <!-- Contenido dinámico: información de perfil o botón de inicio de sesión -->
  </div>
  <div class="welcome-message" id="welcome-message">
    Prueba de funcionamiento de localización en tiempo real
  </div>
  <hr>
  <h4>Tu ubicación</h4>
  <p id="location-info"></p>
  <hr>
  <h4>Buscar otro usuario</h4>
  <input type="text" id="search-user-id" placeholder="Introduce la ID del usuario">
  <button onclick="startRealTimeTracking()">Localizar en tiempo real</button>
  <p id="search-result"></p>
</div>

<!-- Contenedor para autenticación -->
<div id="auth-container" class="auth-container" style="display:none;">
  <div class="auth-card">
    <h3 style="text-align: center; margin-top: 0; color: #3498db;">Bienvenido al Sistema de Localización</h3>
    <p style="text-align: center; margin-bottom: 20px;">Por favor inicia sesión o regístrate para continuar</p>
    <div class="auth-tabs">
      <div class="auth-tab active" id="login-tab" onclick="showTab('login')">Iniciar Sesión</div>
      <div class="auth-tab" id="register-tab" onclick="showTab('register')">Registrarse</div>
    </div>
    
    <!-- Formulario de inicio de sesión -->
    <div id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-username">Nombre de usuario</label>
        <input type="text" id="login-username" placeholder="Nombre de usuario">
      </div>
      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" placeholder="Contraseña">
      </div>
      <button class="auth-button" onclick="loginUser()">Iniciar Sesión</button>
      <p id="login-error" class="error-message"></p>
    </div>
    
    <!-- Formulario de registro -->
    <div id="register-form" class="auth-form" style="display:none;">
      <div class="form-group">
        <label for="register-username">Nombre de usuario</label>
        <input type="text" id="register-username" placeholder="Nombre de usuario">
      </div>
      <div class="form-group">
        <label for="register-email">Correo electrónico</label>
        <input type="email" id="register-email" placeholder="Correo electrónico">
      </div>
      <div class="form-group">
        <label for="register-password">Contraseña</label>
        <input type="password" id="register-password" placeholder="Contraseña">
      </div>
      <div class="form-group">
        <label for="register-confirm-password">Confirmar contraseña</label>
        <input type="password" id="register-confirm-password" placeholder="Confirmar contraseña">
      </div>
      <button class="auth-button" onclick="registerUser()">Registrarse</button>
      <p id="register-error" class="error-message"></p>
    </div>
  </div>
</div>

<script>  
  // Añade tu token de acceso de Mapbox
  mapboxgl.accessToken = 'pk.eyJ1IjoiNG5nM2wiLCJhIjoiY205cTJtN284MWI4dDJqb2J0cWRjZWk2dSJ9.Bk-OJNIYS060ah6qOH3BXw';
  
  // URL base del servidor
  const API_BASE_URL = 'https://usm-839u.onrender.com';
  
  // Opciones para las solicitudes fetch
  const fetchOptions = {
    credentials: 'include',  // Incluir cookies en todas las solicitudes
    headers: { 
      'Content-Type': 'application/json'
    }
  };
  
  // Estado de autenticación
  let authState = {
    authenticated: false,
    user_id: null,
    username: null
  };
  
  // Mostrar el diálogo de autenticación inmediatamente al cargar la página
  document.addEventListener('DOMContentLoaded', function() {
    // Mostrar el diálogo de autenticación por defecto
    document.getElementById('auth-container').style.display = 'flex';
    
    // Comprobar sesión después de mostrar el diálogo
    checkSession();
  });
  
  // Función para mostrar/ocultar paneles de autenticación
  function showTab(tab) {
    if (tab === 'login') {
      document.getElementById('login-tab').classList.add('active');
      document.getElementById('register-tab').classList.remove('active');
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('register-form').style.display = 'none';
    } else {
      document.getElementById('login-tab').classList.remove('active');
      document.getElementById('register-tab').classList.add('active');
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
    }
  }
  
  // Función para mostrar el diálogo de autenticación
  function showAuthDialog() {
    document.getElementById('auth-container').style.display = 'flex';
  }
  
  // Función para ocultar el diálogo de autenticación
  function hideAuthDialog() {
    document.getElementById('auth-container').style.display = 'none';
    // Mostrar completamente el mapa cuando el usuario se autentica
    document.getElementById('map').style.opacity = '1';
  }
  
  // Iniciar sesión
  function loginUser() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    
    if (!username || !password) {
      document.getElementById('login-error').textContent = 'Por favor, completa todos los campos';
      return;
    }
    
    fetch(`${API_BASE_URL}/login`, {
      method: 'POST',
      ...fetchOptions,
      body: JSON.stringify({ username, password })
    })
    .then(response => response.json())
    .then(data => {
      if (data.error) {
        document.getElementById('login-error').textContent = data.error;
      } else {
        authState.authenticated = true;
        authState.user_id = data.user_id;
        authState.username = data.username;
        updateAuthUI();
        hideAuthDialog();
        // Activar geolocalización después de iniciar sesión
        geolocateControl.trigger();
      }
    })
    .catch(error => {
      document.getElementById('login-error').textContent = 'Error al conectar con el servidor';
      console.error('Error:', error);
    });
  }
  
  // Registrar usuario
  function registerUser() {
    const username = document.getElementById('register-username').value;
    const email = document.getElementById('register-email').value;
    const password = document.getElementById('register-password').value;
    const confirmPassword = document.getElementById('register-confirm-password').value;
    
    if (!username || !email || !password || !confirmPassword) {
      document.getElementById('register-error').textContent = 'Por favor, completa todos los campos';
      return;
    }
    
    if (password !== confirmPassword) {
      document.getElementById('register-error').textContent = 'Las contraseñas no coinciden';
      return;
    }
    
    fetch(`${API_BASE_URL}/register`, {
      method: 'POST',
      ...fetchOptions,
      body: JSON.stringify({ username, email, password })
    })
    .then(response => response.json())
    .then(data => {
      if (data.error) {
        document.getElementById('register-error').textContent = data.error;
      } else {
        authState.authenticated = true;
        authState.user_id = data.user_id;
        authState.username = data.username;
        updateAuthUI();
        hideAuthDialog();
        // Activar geolocalización después de registrarse
        geolocateControl.trigger();
      }
    })
    .catch(error => {
      document.getElementById('register-error').textContent = 'Error al conectar con el servidor';
      console.error('Error:', error);
    });
  }
  
  // Cerrar sesión
  function logoutUser() {
    fetch(`${API_BASE_URL}/logout`, {
      method: 'POST',
      ...fetchOptions
    })
    .then(response => response.json())
    .then(data => {
      authState.authenticated = false;
      authState.user_id = null;
      authState.username = null;
      updateAuthUI();
    })
    .catch(error => {
      console.error('Error al cerrar sesión:', error);
    });
  }
  
  // Comprobar estado de sesión
  function checkSession() {
    fetch(`${API_BASE_URL}/check-session`, {
      method: 'GET',
      ...fetchOptions
    })
    .then(response => response.json())
    .then(data => {
      authState.authenticated = data.authenticated;
      if (data.authenticated) {
        authState.user_id = data.user_id;
        authState.username = data.username;
        updateAuthUI();
        hideAuthDialog(); // Ocultar el diálogo solo si el usuario está autenticado
        // Activar geolocalización si el usuario está autenticado
        geolocateControl.trigger();
      } else {
        // Si no está autenticado, actualizar la UI pero mantener el diálogo abierto
        updateAuthUI();
      }
    })
    .catch(error => {
      console.error('Error al comprobar sesión:', error);
      // No hacer nada en caso de error, mantener el diálogo abierto
    });
  }
  
  // Actualizar UI basado en estado de autenticación
  function updateAuthUI() {
    const profileSection = document.getElementById('profile-section');
    
    if (authState.authenticated) {
      profileSection.innerHTML = `
        <div class="profile-info">
          <strong>Usuario:</strong> ${authState.username}<br>
          <strong>ID:</strong> ${authState.user_id}
        </div>
        <button class="logout-button" onclick="logoutUser()">Cerrar sesión</button>
      `;
    } else {
      profileSection.innerHTML = `
        <button class="auth-button" onclick="showAuthDialog()">Iniciar sesión / Registrarse</button>
      `;
    }
  }
  
  const map = new mapboxgl.Map({  
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [0, 0], // Coordenadas iniciales (se actualizarán)
    zoom: 2 // Zoom inicial (se actualizará)
  });  

  // Añadir control de geolocalización al mapa
  const geolocateControl = new mapboxgl.GeolocateControl({
    positionOptions: {
      enableHighAccuracy: true
    },
    trackUserLocation: true,
    showUserHeading: true,
    showAccuracyCircle: true
  });
  
  map.addControl(geolocateControl);

  // Función para alternar la visibilidad del panel de información
  function toggleInfoPanel() {
    const infoPanel = document.getElementById('info-panel');
    const isHidden = infoPanel.classList.toggle('hidden');
    localStorage.setItem('infoPanelHidden', isHidden); // Guardar el estado en localStorage
  }

  // Variable para almacenar el marcador actual
  let currentMarker = null;
  let trackingInterval = null;

  // Activar automáticamente la geolocalización al cargar el mapa
  map.on('load', () => {
    // Ya no activamos geolocalización aquí, sino después de autenticarse
    // La comprobación de sesión ya se hace en DOMContentLoaded
  });

  // Ocultar el mapa inicialmente hasta que el usuario se autentique
  document.getElementById('map').style.opacity = '0.3';

  // Actualizar el panel de información cuando se obtiene la ubicación
  geolocateControl.on('geolocate', function(e) {
    const longitude = e.coords.longitude;
    const latitude = e.coords.latitude;

    // Eliminar el marcador actual si existe
    if (currentMarker) {
      currentMarker.remove();
    }

    // Agregar un marcador para la ubicación del usuario principal
    currentMarker = new mapboxgl.Marker({ color: 'blue' }) // Marcador azul
      .setLngLat([longitude, latitude])
      .addTo(map);

    // Obtener la dirección del usuario principal
    fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${longitude},${latitude}.json?access_token=${mapboxgl.accessToken}`)
      .then(response => response.json())
      .then(data => {
        const address = data.features[0]?.place_name || 'Dirección no disponible';
        const userId = authState.authenticated ? authState.user_id : 'anónimo';
        document.getElementById('location-info').innerHTML = 
          `<strong>Dirección:</strong> ${address}`;
      })
      .catch(err => console.error('Error al obtener la dirección:', err));

    // Actualizar la ubicación en el servidor
    fetch(`${API_BASE_URL}/update-location`, {
      method: 'POST',
      ...fetchOptions,
      body: JSON.stringify({
        userId: authState.authenticated ? authState.user_id : 'anónimo',
        latitude,
        longitude
      })
    }).then(response => response.json())
      .then(data => console.log(data))
      .catch(err => console.error('Error al actualizar la ubicación:', err));
  });

  // Función para iniciar el seguimiento en tiempo real
  function startRealTimeTracking() {
    const searchUserId = document.getElementById('search-user-id').value;
    if (!searchUserId) {
      document.getElementById('search-result').innerHTML = 'Por favor, introduce una ID válida.';
      return;
    }

    // Limpiar cualquier intervalo previo
    if (trackingInterval) {
      clearInterval(trackingInterval);
    }

    // Iniciar un intervalo para actualizar la ubicación cada 5 segundos
    trackingInterval = setInterval(() => {
      fetch(`${API_BASE_URL}/get-location/${searchUserId}`, {
        ...fetchOptions
      })
        .then(response => {
          if (!response.ok) {
            throw new Error('Usuario no encontrado');
          }
          return response.json();
        })
        .then(location => {
          const { latitude, longitude } = location;

          // Centrar el mapa en la ubicación del usuario
          map.flyTo({
            center: [longitude, latitude],
            zoom: 14
          });

          // Eliminar el marcador actual si existe
          if (currentMarker) {
            currentMarker.remove();
          }

          // Agregar un nuevo marcador en la ubicación del usuario buscado
          currentMarker = new mapboxgl.Marker({ color: 'red' }) // Marcador rojo
            .setLngLat([longitude, latitude])
            .addTo(map);

          // Obtener la dirección del usuario buscado
          fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${longitude},${latitude}.json?access_token=${mapboxgl.accessToken}`)
            .then(response => response.json())
            .then(data => {
              const address = data.features[0]?.place_name || 'Dirección no disponible';
              document.getElementById('search-result').innerHTML = 
                `<strong>Ubicación del usuario ${searchUserId}:</strong><br>` +
                `<strong>Dirección:</strong> ${address}<br>` +
                `Latitud: ${latitude.toFixed(6)}<br>` +
                `Longitud: ${longitude.toFixed(6)}`;
            })
            .catch(err => console.error('Error al obtener la dirección:', err));
        })
        .catch(err => {
          console.error(err);
          document.getElementById('search-result').innerHTML = 
            `<strong>Error:</strong> No se pudo localizar al usuario.`;
        });
    }, 5000); // Actualizar cada 5 segundos
  }
</script>  
</body>  
</html>
