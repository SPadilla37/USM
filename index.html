<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transporte USM</title>
  <link rel="stylesheet" href="mobile_styles.css"> <!-- Using mobile_styles.css -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    body {
      font-family: 'Roboto', Arial, sans-serif; /* Roboto as primary font */
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center; /* Center content horizontally */
      min-height: 100vh;
      background-color: #fff; /* White background */
      padding-top: 90px; /* Adjusted space for fixed header */
      box-sizing: border-box;
    }

    .header {
      background-color: #000;
      color: #fff;
      padding: 20px 40px;
      width: 100%;
      text-align: left;
      font-size: 28px;
      font-weight: 700; /* Bold */
      font-family: 'Roboto', sans-serif;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      box-sizing: border-box;
    }

    .main-container {
      text-align: center;
      width: 100%;
      max-width: 350px; /* Consistent with other mobile pages */
      padding: 20px;
      box-sizing: border-box;
    }

    .main-container h1 {
      font-size: 24px;
      margin-bottom: 40px;
      font-weight: 700;
      color: #333;
    }

    .action-button {
      display: block;
      width: 100%;
      padding: 15px;
      background-color: #000;
      color: #fff !important; /* Ensure white text */
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Roboto', sans-serif;
      text-decoration: none;
      cursor: pointer;
      margin: 20px auto;
      box-sizing: border-box;
      text-align: center;
      font-weight: 700; /* Bold button text */
    }

    .action-button:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <div class="header">USM</div>

  <div class="main-container">
    <h1>Bienvenido a Transporte USM</h1>
    <a href="login_mobile.html" class="action-button">Iniciar Sesión</a>
    <a href="login_mobile.html" class="action-button">Registrarse</a>
  </div>

  <!-- Script for session check and redirection -->
  <script src="auth.js" defer></script>
</body>
</html>
