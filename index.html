<!DOCTYPE html>  
<html>  
<head>  
<meta charset="utf-8">  
<title>Transporte USM</title>  
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">  
<link href="style.css" rel="stylesheet">
<style>
.welcome-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #0f4c81; /* Color azul USM */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  color: white;
  text-align: center;
}

.welcome-logo-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
}

.welcome-logo {
  height: 120px;
  margin-right: 20px;
}

.bus-icon {
  height: 80px;
}

.welcome-title {
  font-size: 36px;
  font-weight: bold;
  margin: 20px 0;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}

.welcome-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.welcome-button {
  background-color: white;
  color: #0f4c81;
  border: none;
  padding: 12px 30px;
  border-radius: 25px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.welcome-button:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
}
</style>
</head>  
<body>  
<!-- Pantalla de bienvenida -->
<div id="welcome-screen" class="welcome-screen">
  <div class="welcome-logo-container">
    <img src="https://www.usm.cl/assets/img/logo-usm.png" alt="Logo USM" class="welcome-logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3774/3774270.png" alt="Bus Icon" class="bus-icon">
  </div>
  <h2 style="margin-top: 0; margin-bottom: 10px; font-size: 28px;">¡Bienvenidos!</h2>
  <h1 class="welcome-title">Transporte USM</h1>
  <div class="welcome-buttons">
    <a href="login_mobile.html" class="welcome-button">Iniciar Sesión</a>
    <a href="login_mobile.html" class="welcome-button">Registrarse</a>
  </div>
</div>

<script>
  // Verificar si hay sesión activa - ESTA LÓGICA AHORA ESTÁ EN AUTH.JS Y ES MÁS COMPLETA
  // document.addEventListener('DOMContentLoaded', function() {
  //   if (localStorage.getItem('authToken')) {
  //     window.location.href = 'mapa.html';
  //   }
  // });
</script>

</body>  
</html>
