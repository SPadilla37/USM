<!DOCTYPE html>  
<html>  
<head>  
<meta charset="utf-8">  
<title>Mapa de Ubicación - Transporte USM</title>  
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">  
<link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link href="style.css" rel="stylesheet">
<link rel="stylesheet" href="sidebar_style.css"> <!-- Added sidebar styles -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>  
</head>  
<body>  
    <div class="sidebar">
        <div class="header">
            <div class="menu-btn">
                <i class='bx bxs-chevron-left'></i>
            </div>
            <div class="brand">
                <img src="brand/brand-light.svg" alt="logo">
                <span>USM</span>
            </div>
        </div>
        <div class="menu-container">
            <div class="search">
                <i class='bx bx-search'></i>
                <input type="search " placeholder="search">
            </div>
            <ul class="menu">
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx bx-home-alt-2'></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx bx-bar-chart-alt-2'></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="menu-item menu-item-dropdown">
                    <a href="#" class="menu-link">
                        <i class='bx bx-car'></i>
                        <span>Car</span>
                        <i class='bx bx-chevron-down'></i>
                    </a>
                    <ul class="sub-menu">
                        <li><a href="#" class="sub-menu-link">routes</a></li>
                        <li><a href="#" class="sub-menu-link">shared ride</a></li>
                    </ul>
                </li>
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx bx-bus'></i>
                        <span>Bus</span>
                    </a>
                </li>
                <li class="menu-item menu-item-dropdown">
                    <a href="#" class="menu-link">
                        <i class='bx bx-file-blank'></i>
                        <span>File</span>
                        <i class='bx bx-chevron-down'></i>
                    </a>
                    <ul class="sub-menu">
                        <li><a href="#" class="sub-menu-link">Images</a></li>
                        <li><a href="#" class="sub-menu-link">Audios</a></li>
                    </ul>
                </li>
            </ul>
        </div>
        <div class="footer">
            <ul class="menu">
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx bx-bell'></i>
                        <span>Notification</span>
                    </a>
                </li>
                <li class="menu-item menu-item-static">
                    <a href="#" class="menu-link">
                        <i class='bx bx-cog'></i>
                        <span>Setting</span>
                    </a>
                </li>
            </ul>
            <div class="user">
                <div class="user-img">
                    <img src="user_img.png" alt="user">
                </div>
                <div class="user-data">
                    <span class="name">Angel</span>
                </div>
                <div class="user-icon">
                    <i class='bx bx-log-out'></i>
                </div>
            </div>
        </div>
    </div>
<div id="map"></div>
<button class="toggle-button" onclick="toggleInfoPanel()">☰</button>

<!-- Panel de información principal -->
<div id="info-panel" class="info-panel">
  <div id="profile-section" class="profile-section">
    <!-- Contenido dinámico: información de perfil o botón de inicio de sesión -->
  </div>
  <div class="welcome-message" id="welcome-message">
    Localización en tiempo real - Transporte USM
  </div>
  <hr>
  <h4>Tu ubicación</h4>
  <p id="location-info"></p>
  <hr>
  <h4>Buscar otro usuario</h4>
  <input type="text" id="search-user-id" placeholder="Introduce la ID del usuario">
  <button onclick="startRealTimeTracking()">Localizar en tiempo real</button>
  <p id="search-result"></p>
</div>

<script src="map.js"></script>  
<script src="script_sidebar.js"></script> <!-- Added sidebar script -->
</body>  
</html>
