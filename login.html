<!DOCTYPE html>  
<html>  
<head>  
<meta charset="utf-8">  
<title>Iniciar Sesión - Transporte USM</title>  
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">  
<link href="style.css" rel="stylesheet">
</head>  
<body class="auth-page">  
<div class="auth-container" style="display: flex;">
  <div class="auth-card">
    <h3 style="text-align: center; margin-top: 0; color: #3498db;">Iniciar Sesión</h3>
    
    <!-- Formulario de inicio de sesión -->
    <div id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-username">Nombre de usuario</label>
        <input type="text" id="login-username" placeholder="Nombre de usuario">
      </div>
      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" placeholder="Contraseña">
      </div>
      <button class="auth-button" onclick="loginUser()">Iniciar Sesión</button>
      <p id="login-error" class="error-message"></p>
      <div class="switch-form">
        <span>¿No tienes cuenta?</span> <a href="registro.html">Registrarse</a>
      </div>
    </div>
  </div>
</div>

<script src="auth.js"></script>  
</body>  
</html>
